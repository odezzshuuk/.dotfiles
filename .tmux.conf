set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:RGB"

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -g allow-passthrough on

# action key unbind C-b
set-option -g prefix C-t

set -g mouse off
# set -g mouse-select-pane on
set-option -g repeat-time 600
set-option -g focus-events on
set-option -g escape-time 0
set-option -g status-position top
set-option -g status-style bg=default
set-option -g renumber-windows on
set-option -g default-shell /usr/bin/fish

# bind prefix
bind-key C-t send-prefix

## reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# split panes using v and h
bind h split-window -v -c '#{pane_current_path}'  # -v: split with full width, so horizontal split
bind v split-window -h -c '#{pane_current_path}'  # -h: split with full height, so vertical split
unbind '"'
unbind %

# pane navigation
# bind k select-pane -U
# bind j select-pane -D
# bind h select-pane -L
# bind l select-pane -R

# resize panes
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# layout
bind-key a select-layout main-horizontal

# display pane number
set -g base-index 1
set -g pane-base-index 1

# copy mode settings
set -g mode-keys vi
set-window-option -g mode-style fg=colour190,bg=colour24
set-option -g history-limit 9999

bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

## color
set -g window-style fg=colour70,bg=default
set -g window-active-style fg=colour15,bg=default
# set -g pane-border-style fg=colour235,bg=#222222 #base02
# set -g pane-active-border-style fg=colour166,bg=#000000
set -g pane-border-style "fg=#000000,bg=#000000"
set -g pane-active-border-style "fg=#5cfe64,bg=#000000,bold"

# move window
bind-key -n C-S-Up swap-window -t -1 \; previous-window
bind-key -n C-S-Down swap-window -t +1 \; next-window

# switch window
bind-key -n C-S-Left previous-window
bind-key -n C-S-Right next-window

bind-key s command-prompt -p "send pane to:"  "join-pane -h -t ':%%'" # send pane to
bind-key S command-prompt -F -p "send current window from session '#S' to:" "move-window -t '%%:'" # send current window to


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'erikw/tmux-powerline'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# overwrite plugin

